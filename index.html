<!DOCTYPE html>
<html lang="es">
<head> 

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<meta
name="theme-color"
content="#020617">

<title>Panel Administrativo</title>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* 🔥 CONTENEDOR PENDIENTES */
#pendingGrid{
display:flex;
flex-direction:column;
gap:10px;

/* 🔥 CAMBIO */
max-height:420px;

overflow-y:auto;
overflow-x:hidden;

padding:10px;
padding-right:4px;

scroll-behavior:smooth;

background:rgba(2,6,23,.35);

border-radius:22px;

/* 🔥 NUEVO */
scrollbar-width:thin;
overscroll-behavior:contain;
}

/* 🔥 SCROLL PENDIENTES */
#pendingGrid::-webkit-scrollbar{
width:5px;
}

#pendingGrid::-webkit-scrollbar-track{
background:rgba(255,255,255,.03);
border-radius:20px;
}

#pendingGrid::-webkit-scrollbar-thumb{
background:#334155;
border-radius:20px;
}

/* 🔥 PENDIENTES */
.pending-card{
background:rgba(15,23,42,.82);
border-radius:16px;
padding:10px;
border:1px solid rgba(255,255,255,.04);
backdrop-filter:blur(12px);

min-height:auto;
}

.pending-top{
display:flex;
align-items:flex-start;
gap:10px;
}

.pending-logo{
width:54px;
height:54px;
border-radius:14px;
object-fit:cover;
background:#fff;
padding:2px;
flex-shrink:0;
}

.pending-content{
flex:1;
overflow:hidden;
}

.pending-name{
font-size:13px;
font-weight:700;
line-height:1.1;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.pending-meta{
font-size:10px;
opacity:.8;
margin-top:2px;
line-height:1.2;
}

.pending-description{
font-size:10px;
opacity:.75;
margin-top:4px;
line-height:1.3;

display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
overflow:hidden;
}

.pending-audio{
width:100%;
margin-top:6px;
height:24px;

transform:scale(.90);

border-radius:8px;
}

.pending-buttons{
display:flex;
gap:8px;
margin-top:8px;
}

.pending-buttons button{
flex:1;
padding:8px;
font-size:11px;
border-radius:12px;
}

/* 🔥 CONTENEDOR APROBADAS */
#approvedGrid{
display:flex;
flex-direction:column;
gap:8px;

/* 🔥 CAMBIO */
max-height:350px;

overflow-y:auto;
overflow-x:hidden;

padding:10px;
padding-right:4px;

scroll-behavior:smooth;

background:rgba(2,6,23,.35);

border-radius:22px;

/* 🔥 NUEVO */
scrollbar-width:thin;
overscroll-behavior:contain;
}

/* 🔥 SCROLL APROBADAS */
#approvedGrid::-webkit-scrollbar{
width:5px;
}

#approvedGrid::-webkit-scrollbar-track{
background:rgba(255,255,255,.03);
border-radius:20px;
}

#approvedGrid::-webkit-scrollbar-thumb{
background:#166534;
border-radius:20px;
}

.approved-item{
display:flex;
align-items:center;
gap:10px;
padding:10px 12px;
background:rgba(15,23,42,.78);
border-radius:16px;
border:1px solid rgba(255,255,255,.03);
min-height:64px;
}

.approved-number{
width:28px;
height:28px;
border-radius:10px;
background:#166534;
display:flex;
align-items:center;
justify-content:center;
font-size:11px;
font-weight:800;
flex-shrink:0;
}

.approved-logo{
width:40px;
height:40px;
border-radius:12px;
object-fit:cover;
background:#fff;
padding:2px;
flex-shrink:0;
}

.approved-info{
flex:1;
min-width:0;
overflow:hidden;
}

.approved-name{
font-size:12px;
font-weight:700;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
line-height:1.2;
}

.approved-meta{
font-size:10px;
opacity:.72;
margin-top:2px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

/* 🔥 FOOTER */
.footer{
margin-top:18px;
padding-bottom:10px;
display:flex;
justify-content:center;
}

/* 🔥 FOOTER BOX */
.footer-box{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
padding:14px 22px;
border-radius:18px;

background:
linear-gradient(
180deg,
rgba(30,41,59,.92),
rgba(15,23,42,.95)
);

border:1px solid rgba(255,255,255,.06);

box-shadow:
0 8px 30px rgba(0,0,0,.35);

backdrop-filter:blur(10px);

font-size:12px;
font-weight:700;

color:#38bdf8;

letter-spacing:.5px;
}

/* 🔥 ICONO */
.footer-box i{
font-size:15px;
color:#22c55e;
}

</style>

</head>

<body>

<div class="admin-app">

<!-- 🔥 HEADER -->
<div class="topbar">

<div class="logo-box">

<img
src="https://i.ibb.co/qY7V1cVg/4008656-splash.png"
class="panel-logo">

<div>

<h1>
RADIOS MULTIPLES
</h1>

<p class="subtitle">
Panel Administrativo
</p>

</div>

</div>

<!-- 🔥 CONTADORES -->
<div class="status-box">

<div class="status-item pending">

<div class="status-icon">
🕒
</div>

<div>

<div class="status-title">
Radios Pendientes
</div>

<div class="status-number" id="pendingCount">
0
</div>

</div>

</div>

<div class="status-item approved">

<div class="status-icon">
✅
</div>

<div>

<div class="status-title">
Radios Aprobadas
</div>

<div class="status-number" id="approvedCount">
0
</div>

</div>

</div>

</div>

</div>

<!-- 🔥 PENDIENTES -->
<div class="section-title">
🕒 Radios Pendientes
</div>

<div id="pendingGrid"></div>

<!-- 🔥 APROBADAS -->
<div class="section-title">
✅ Radios Aprobadas
</div>

<div id="approvedGrid"></div>

<!-- 🔥 FOOTER -->
<div class="footer">
    
<div class="footer-box">

<i class="fas fa-radio"></i>

<span>
RADIOS MULTIPLES © 2026
</span>

</div>

</div>

</div>

<script>

/* 🔥 API */
const API_URL =
"https://script.google.com/macros/s/AKfycbx6x3SlWnUmVPRnSbxB_eWouTJTpLygrrcP65Dvo_8thYHWSTLRYb5D2r1hwEqTsBqx_w/exec";

/* 🔥 ELEMENTOS */
const pendingGrid =
document.getElementById("pendingGrid");

const approvedGrid =
document.getElementById("approvedGrid");

const pendingCount =
document.getElementById("pendingCount");

const approvedCount =
document.getElementById("approvedCount");

/* 🔥 CREAR CARD */
function crearCard(radio,pendiente=true,index=0){

/* 🔥 PENDIENTES */
if(pendiente){

return `

<div class="pending-card">

<div class="pending-top">

<img
src="${radio.logo || 'https://via.placeholder.com/150'}"
class="pending-logo"
onerror="this.src='https://via.placeholder.com/150'">

<div class="pending-content">

<div class="pending-name">
${radio.nombre || 'Sin nombre'}
</div>

<div class="pending-meta">
🌎 ${radio.pais || 'Sin país'}
</div>

<div class="pending-meta">
📍 ${radio.ciudad || 'Sin ciudad'}
</div>

</div>

</div>

<audio
class="pending-audio"
controls
preload="none">

<source
src="${radio.stream || ''}"
type="audio/mpeg">

</audio>

<div class="pending-buttons">

<button
class="approve"
onclick="aprobar(${radio.fila})">

✅ Aprobar

</button>

<button
class="delete"
onclick="eliminar(${radio.fila})">

🗑 Eliminar

</button>

</div>

</div>

`;

}

/* 🔥 APROBADAS */
return `

<div class="approved-item">

<div class="approved-number">
${index + 1}
</div>

<img
src="${radio.logo || 'https://via.placeholder.com/150'}"
class="approved-logo"
onerror="this.src='https://via.placeholder.com/150'">

<div class="approved-info">

<div class="approved-name">
${radio.nombre || 'Sin nombre'}
</div>

<div class="approved-meta">
🌎 ${radio.pais || 'Sin país'} • 📍 ${radio.ciudad || 'Sin ciudad'}
</div>

</div>

</div>

`;

}

/* 🔥 CARGAR RADIOS */
async function cargarRadios(){

pendingGrid.innerHTML =
`
<div class="empty">
📡 Cargando radios...
</div>
`;

approvedGrid.innerHTML =
`
<div class="empty">
📡 Cargando radios...
</div>
`;

try{

const response =
await fetch(
API_URL + "?nocache=" + Date.now(),
{
method:"GET"
}
);

if(!response.ok){

throw new Error(
"HTTP ERROR: " + response.status
);

}

const data =
await response.json();

console.log("DATOS:",data);

/* 🔥 LIMPIAR */
pendingGrid.innerHTML = "";
approvedGrid.innerHTML = "";

/* 🔥 ARRAYS */
const pendientes =
Array.isArray(data.pendientes)
? data.pendientes
: [];

const aprobadas =
Array.isArray(data.aprobadas)
? data.aprobadas
: [];

/* 🔥 CONTADORES */
pendingCount.textContent =
pendientes.length;

approvedCount.textContent =
aprobadas.length;

/* 🔥 PENDIENTES */
if(pendientes.length === 0){

pendingGrid.innerHTML =
`
<div class="empty">
✅ No hay radios pendientes
</div>
`;

}else{

pendientes.forEach((radio,index)=>{

pendingGrid.innerHTML +=
crearCard(radio,true,index);

});

}

/* 🔥 APROBADAS */
if(aprobadas.length === 0){

approvedGrid.innerHTML =
`
<div class="empty">
📻 No hay radios aprobadas
</div>
`;

}else{

aprobadas.forEach((radio,index)=>{

approvedGrid.innerHTML +=
crearCard(radio,false,index);

});

}

}catch(error){

console.log("ERROR:",error);

pendingGrid.innerHTML =
`
<div class="empty">
❌ Error cargando radios
</div>
`;

approvedGrid.innerHTML =
`
<div class="empty">
⚠️ ${error.message}
</div>
`;

}

}

/* 🔥 APROBAR */
async function aprobar(fila){

try{

await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"aprobar",
fila:fila
})
});

cargarRadios();

}catch(error){

console.log("ERROR APROBAR:",error);

}

}

/* 🔥 ELIMINAR */
async function eliminar(fila){

try{

await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"eliminar",
fila:fila
})
});

cargarRadios();

}catch(error){

console.log("ERROR ELIMINAR:",error);

}

}

/* 🔥 INICIAR */
window.onload = cargarRadios;

</script>

</body>
</html>
