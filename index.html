<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<meta
name="theme-color"
content="#020617">

<title>Panel Administrativo</title>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html{
width:100%;
height:100%;
overflow:hidden;
overscroll-behavior:none;
}

body{
width:100%;
height:100%;
overflow:hidden;
font-family:Poppins,sans-serif;
background:
linear-gradient(rgba(2,6,23,.94),rgba(2,6,23,.98)),
url("https://images.unsplash.com/photo-1511379938547-c1f69419868d?q=80&w=1200&auto=format&fit=crop");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
color:#fff;
position:fixed;
inset:0;
}

/* 🔥 APP */
.admin-app{
width:100%;
height:100dvh;
overflow-y:auto;
overflow-x:hidden;
padding:8px;
padding-bottom:12px;
-webkit-overflow-scrolling:touch;
}

/* 🔥 SCROLL */
.admin-app::-webkit-scrollbar{
width:3px;
}

.admin-app::-webkit-scrollbar-thumb{
background:#334155;
border-radius:20px;
}

/* 🔥 TOPBAR */
.topbar{
display:flex;
flex-direction:column;
gap:8px;
margin-bottom:10px;
}

/* 🔥 LOGO */
.logo-box{
display:flex;
align-items:center;
gap:10px;
width:100%;
padding:10px;
background:rgba(2,6,23,.70);
border:1px solid rgba(255,255,255,.04);
border-radius:18px;
backdrop-filter:blur(12px);
}

.panel-logo{
width:50px;
height:50px;
border-radius:14px;
object-fit:cover;
background:#fff;
padding:3px;
flex-shrink:0;
}

/* 🔥 TITULO */
h1{
font-size:18px;
font-weight:800;
line-height:1;
}

.subtitle{
opacity:.7;
margin-top:3px;
font-size:10px;
}

/* 🔥 CONTADORES */
.status-box{
display:flex;
flex-direction:column;
gap:8px;
width:100%;
}

.status-item{
display:flex;
align-items:center;
gap:10px;
padding:10px;
border-radius:18px;
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.05);
}

.status-item.pending{
background:rgba(15,23,42,.88);
}

.status-item.approved{
background:rgba(5,46,22,.88);
border-color:#166534;
}

.status-icon{
width:40px;
height:40px;
border-radius:13px;
display:flex;
align-items:center;
justify-content:center;
font-size:17px;
flex-shrink:0;
}

.status-item.pending .status-icon{
background:rgba(234,179,8,.12);
border:1px solid rgba(234,179,8,.25);
}

.status-item.approved .status-icon{
background:rgba(34,197,94,.15);
border:1px solid rgba(34,197,94,.25);
}

.status-title{
font-size:11px;
opacity:.7;
font-weight:600;
}

.status-number{
font-size:18px;
font-weight:800;
margin-top:2px;
}

/* 🔥 TITULOS */
.section-title{
font-size:15px;
font-weight:800;
margin-top:12px;
margin-bottom:8px;
display:flex;
align-items:center;
gap:6px;
}

/* 🔥 GRID */
.grid{
display:grid;
grid-template-columns:1fr;
gap:10px;
}

/* 🔥 CARD */
.card{
background:rgba(15,23,42,.82);
border-radius:20px;
padding:12px;
border:1px solid rgba(255,255,255,.04);
backdrop-filter:blur(12px);
overflow:hidden;
}

/* 🔥 LOGO RADIO */
.logo{
width:68px;
height:68px;
border-radius:16px;
object-fit:cover;
display:block;
margin:auto;
background:#fff;
padding:3px;
}

/* 🔥 NOMBRE */
.name{
font-size:14px;
font-weight:800;
margin-top:10px;
text-align:center;
line-height:1.2;
}

/* 🔥 INFO */
.info{
font-size:10px;
opacity:.9;
margin-top:4px;
text-align:center;
line-height:1.3;
word-break:break-word;
color:#cbd5e1;
}

/* 🔥 AUDIO */
audio{
width:100%;
margin-top:8px;
height:30px;
border-radius:10px;
}

/* 🔥 BOTONES */
.buttons{
display:flex;
flex-direction:column;
gap:7px;
margin-top:10px;
}

button{
width:100%;
border:none;
padding:9px;
border-radius:12px;
font-weight:700;
cursor:pointer;
font-size:11px;
font-family:Poppins;
}

button:active{
transform:scale(.96);
}

.approve{
background:linear-gradient(180deg,#22c55e,#16a34a);
color:#fff;
}

.delete{
background:linear-gradient(180deg,#ef4444,#dc2626);
color:#fff;
}

/* 🔥 VACIO */
.empty{
width:100%;
padding:25px 12px;
text-align:center;
font-size:13px;
font-weight:600;
opacity:.75;
background:rgba(15,23,42,.60);
border-radius:18px;
}

/* 🔥 FOOTER */
.footer{
margin-top:14px;
text-align:center;
opacity:.5;
font-size:9px;
padding-bottom:5px;
}

/* 🔥 TABLET */
@media(min-width:700px){

.admin-app{
padding:15px;
}

.status-box{
flex-direction:row;
}

.status-item{
flex:1;
}

.grid{
grid-template-columns:repeat(2,1fr);
}

.buttons{
flex-direction:row;
}

button{
flex:1;
}

}

/* 🔥 PC */
@media(min-width:1100px){

.grid{
grid-template-columns:repeat(3,1fr);
}

h1{
font-size:24px;
}

.section-title{
font-size:20px;
}

}

/* 🔥 TELEFONOS BAJOS */
@media(max-height:740px){

.admin-app{
padding:6px;
}

.logo-box{
padding:8px;
}

.panel-logo{
width:45px;
height:45px;
}

h1{
font-size:16px;
}

.status-item{
padding:8px;
}

.status-icon{
width:35px;
height:35px;
font-size:15px;
}

.status-number{
font-size:16px;
}

.section-title{
font-size:14px;
margin-top:10px;
margin-bottom:6px;
}

.card{
padding:10px;
}

.logo{
width:60px;
height:60px;
}

.name{
font-size:13px;
}

.info{
font-size:9px;
}

audio{
height:28px;
margin-top:6px;
}

button{
padding:8px;
font-size:10px;
}

.empty{
padding:20px 10px;
font-size:12px;
}

.footer{
margin-top:10px;
font-size:8px;
}

}

</style>

</head>

<body>

<div class="admin-app">

<!-- 🔥 HEADER -->
<div class="topbar">

<div class="logo-box">

<img
src="https://i.ibb.co/qY7V1cVg/4008656-splash.png"
class="panel-logo">

<div>

<h1>
RADIOS MULTIPLES
</h1>

<p class="subtitle">
Panel Administrativo
</p>

</div>

</div>

<!-- 🔥 CONTADORES -->
<div class="status-box">

<div class="status-item pending">

<div class="status-icon">
🕒
</div>

<div>

<div class="status-title">
Radios Pendientes
</div>

<div class="status-number" id="pendingCount">
0
</div>

</div>

</div>

<div class="status-item approved">

<div class="status-icon">
✅
</div>

<div>

<div class="status-title">
Radios Aprobadas
</div>

<div class="status-number" id="approvedCount">
0
</div>

</div>

</div>

</div>

</div>

<!-- 🔥 PENDIENTES -->
<div class="section-title">
🕒 Radios Pendientes
</div>

<div
class="grid"
id="pendingGrid">

</div>

<!-- 🔥 APROBADAS -->
<div class="section-title">
✅ Radios Aprobadas
</div>

<div
class="grid"
id="approvedGrid">

</div>

<!-- 🔥 FOOTER -->
<div class="footer">
RADIOS MULTIPLES © 2026
</div>

</div>

<script>

/* 🔥 API */
const API_URL =
"https://script.google.com/macros/s/AKfycbwSUCvzkXZbvHEt2HyIDWQIkeyT4p-N6CxQBg6GRZvyqWtvtl27yOzReNzHjVJ256U8Qg/exec";

/* 🔥 ELEMENTOS */
const pendingGrid =
document.getElementById("pendingGrid");

const approvedGrid =
document.getElementById("approvedGrid");

const pendingCount =
document.getElementById("pendingCount");

const approvedCount =
document.getElementById("approvedCount");

/* 🔥 CARGAR */
async function cargarRadios(){

pendingGrid.innerHTML =
`
<div class="empty">
📡 Cargando radios...
</div>
`;

approvedGrid.innerHTML = "";

try{

const response =
await fetch(API_URL + "?t=" + Date.now());

const text =
await response.text();

const data =
JSON.parse(text);

/* 🔥 LIMPIAR */
pendingGrid.innerHTML = "";
approvedGrid.innerHTML = "";

/* 🔥 VALIDAR */
const pendientes =
data.pendientes || [];

const aprobadas =
data.aprobadas || [];

/* 🔥 CONTADORES */
pendingCount.innerText =
pendientes.length;

approvedCount.innerText =
aprobadas.length;

/* 🔥 SIN PENDIENTES */
if(pendientes.length===0){

pendingGrid.innerHTML =
`
<div class="empty">
✅ No hay radios pendientes
</div>
`;

}else{

pendientes.forEach(radio=>{

pendingGrid.innerHTML += `

<div class="card">

<img
src="${radio.logo}"
class="logo"
onerror="this.src='https://via.placeholder.com/150'">

<div class="name">
${radio.nombre}
</div>

<div class="info">
🌎 ${radio.pais}
</div>

<div class="info">
📍 ${radio.ciudad}
</div>

<div class="info">
${radio.descripcion || ""}
</div>

<audio
controls
preload="none"
src="${radio.stream}">
</audio>

<div class="buttons">

<button
class="approve"
onclick="aprobar(${radio.fila})">

✅ Aprobar

</button>

<button
class="delete"
onclick="eliminar(${radio.fila})">

🗑 Eliminar

</button>

</div>

</div>

`;

});

}

/* 🔥 SIN APROBADAS */
if(aprobadas.length===0){

approvedGrid.innerHTML =
`
<div class="empty">
📻 No hay radios aprobadas
</div>
`;

}else{

aprobadas.forEach(radio=>{

approvedGrid.innerHTML += `

<div class="card">

<img
src="${radio.logo}"
class="logo"
onerror="this.src='https://via.placeholder.com/150'">

<div class="name">
${radio.nombre}
</div>

<div class="info">
🌎 ${radio.pais}
</div>

<div class="info">
📍 ${radio.ciudad}
</div>

<div class="info">
${radio.descripcion || ""}
</div>

<audio
controls
preload="none"
src="${radio.stream}">
</audio>

</div>

`;

});

}

}catch(error){

console.log(error);

pendingGrid.innerHTML =
`
<div class="empty">
❌ Error cargando radios
</div>
`;

}

}

/* 🔥 APROBAR */
async function aprobar(fila){

await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"aprobar",
fila:fila
})
});

cargarRadios();

}

/* 🔥 ELIMINAR */
async function eliminar(fila){

await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"eliminar",
fila:fila
})
});

cargarRadios();

}

/* 🔥 INICIAR */
cargarRadios();

</script>

</body>
</html>
