<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta
name="theme-color"
content="#0b1120">

<title>RADIOS MULTIPLES ADMIN</title>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow-x:hidden;
font-family:Poppins,sans-serif;
background-image:
linear-gradient(rgba(2,6,23,.88),rgba(2,6,23,.94)),
url("https://images.unsplash.com/photo-1590602847861-f357a9332bbc?q=80&w=1200&auto=format&fit=crop");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
color:#fff;
}

/* 🔥 APP */
.admin-app{
width:100%;
min-height:100vh;
padding:20px;
}

/* 🔥 TOPBAR */
.topbar{
position:sticky;
top:0;
z-index:999;
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
margin-bottom:35px;
padding:18px;
border-radius:28px;
background:linear-gradient(180deg,rgba(15,23,42,.96),rgba(17,24,39,.96));
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,.05);
box-shadow:0 10px 28px rgba(0,0,0,.35);
flex-wrap:wrap;
}

/* 🔥 LOGO */
.logo-box{
display:flex;
align-items:center;
gap:18px;
}

.panel-logo{
width:85px;
height:85px;
border-radius:24px;
object-fit:cover;
background:#fff;
padding:4px;
box-shadow:0 10px 25px rgba(0,0,0,.35);
}

/* 🔥 TITULO */
h1{
font-size:32px;
font-weight:800;
margin:0;
line-height:1;
}

.subtitle{
opacity:.7;
margin-top:6px;
font-size:14px;
color:#94a3b8;
}

/* 🔥 CONTADORES */
.status-box{
display:flex;
gap:14px;
flex-wrap:wrap;
}

/* 🔥 TARJETAS ESTADO */
.status-item{
display:flex;
align-items:center;
gap:14px;
padding:16px 18px;
border-radius:22px;
backdrop-filter:blur(10px);
min-width:240px;
box-shadow:0 8px 25px rgba(0,0,0,.25);
border:1px solid rgba(255,255,255,.06);
}

/* 🔥 PENDIENTES */
.status-item.pending{
background:linear-gradient(180deg,#312e81,#1e1b4b);
}

/* 🔥 APROBADAS */
.status-item.approved{
background:linear-gradient(180deg,#14532d,#052e16);
}

/* 🔥 ICONOS */
.status-icon{
width:58px;
height:58px;
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.08);
}

/* 🔥 INFO */
.status-info{
display:flex;
flex-direction:column;
}

.status-title{
font-size:13px;
font-weight:600;
opacity:.8;
}

.status-number{
font-size:30px;
font-weight:800;
line-height:1;
margin-top:5px;
}

/* 🔥 TITULOS */
.section-title{
display:flex;
align-items:center;
gap:10px;
font-size:24px;
font-weight:800;
margin-top:40px;
margin-bottom:20px;
}

.section-title i{
color:#60a5fa;
}

/* 🔥 GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
gap:24px;
}

/* 🔥 CARD */
.card{
position:relative;
background:linear-gradient(180deg,rgba(30,41,59,.96),rgba(17,24,39,.96));
border-radius:30px;
padding:22px;
border:1px solid rgba(255,255,255,.05);
backdrop-filter:blur(14px);
box-shadow:0 10px 30px rgba(0,0,0,.35);
transition:.25s;
overflow:hidden;
}

.card:hover{
transform:translateY(-6px);
}

.card::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:4px;
background:linear-gradient(90deg,#2563eb,#38bdf8);
}

/* 🔥 LOGO RADIO */
.logo{
width:120px;
height:120px;
border-radius:24px;
object-fit:cover;
display:block;
margin:auto;
background:#fff;
padding:4px;
box-shadow:0 8px 20px rgba(0,0,0,.25);
}

/* 🔥 NOMBRE */
.name{
font-size:22px;
font-weight:800;
margin-top:18px;
text-align:center;
line-height:1.2;
}

/* 🔥 TAGS */
.tags{
display:flex;
justify-content:center;
gap:8px;
flex-wrap:wrap;
margin-top:12px;
}

.tag{
padding:7px 12px;
border-radius:999px;
font-size:11px;
font-weight:700;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.05);
color:#cbd5e1;
}

/* 🔥 INFO */
.info{
font-size:13px;
opacity:.92;
margin-top:14px;
text-align:center;
line-height:1.7;
word-break:break-word;
color:#cbd5e1;
}

/* 🔥 REDES */
.links{
display:flex;
justify-content:center;
gap:12px;
flex-wrap:wrap;
margin-top:18px;
}

.links a{
width:42px;
height:42px;
display:flex;
align-items:center;
justify-content:center;
border-radius:14px;
background:rgba(255,255,255,.05);
color:#fff;
text-decoration:none;
font-size:18px;
transition:.2s;
}

.links a:hover{
background:#2563eb;
transform:scale(1.08);
}

/* 🔥 AUDIO */
audio{
width:100%;
margin-top:18px;
border-radius:12px;
}

/* 🔥 BOTONES */
.buttons{
display:flex;
gap:12px;
margin-top:22px;
}

button{
flex:1;
border:none;
padding:15px;
border-radius:16px;
font-weight:700;
cursor:pointer;
font-size:14px;
transition:.2s;
}

button:hover{
transform:scale(1.03);
}

.approve{
background:linear-gradient(180deg,#22c55e,#16a34a);
color:#fff;
}

.delete{
background:linear-gradient(180deg,#ef4444,#dc2626);
color:#fff;
}

/* 🔥 VACIO */
.empty{
width:100%;
padding:70px 20px;
text-align:center;
font-size:20px;
font-weight:600;
opacity:.7;
background:rgba(15,23,42,.70);
border-radius:28px;
border:1px solid rgba(255,255,255,.05);
}

/* 🔥 FOOTER */
.footer{
margin-top:50px;
text-align:center;
opacity:.7;
font-size:13px;
padding-bottom:30px;
color:#94a3b8;
}

/* 🔥 RESPONSIVE */
@media(max-width:700px){

.admin-app{
padding:15px;
}

.topbar{
flex-direction:column;
align-items:flex-start;
padding:18px;
}

.logo-box{
width:100%;
}

.status-box{
width:100%;
flex-direction:column;
}

.status-item{
width:100%;
min-width:auto;
}

h1{
font-size:26px;
}

.grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="admin-app">

<!-- 🔥 HEADER -->
<div class="topbar">

<div class="logo-box">

<img
src="https://i.ibb.co/qY7V1cVg/4008656-splash.png"
class="panel-logo">

<div>

<h1>
RADIOS MULTIPLES
</h1>

<p class="subtitle">
Panel Administrativo Premium
</p>

</div>

</div>

<!-- 🔥 CONTADORES -->
<div class="status-box">

<!-- 🔥 PENDIENTES -->
<div class="status-item pending">

<div class="status-icon">
<i class="fas fa-clock"></i>
</div>

<div class="status-info">

<div class="status-title">
Radios Pendientes
</div>

<div class="status-number" id="pendingCount">
0
</div>

</div>

</div>

<!-- 🔥 APROBADAS -->
<div class="status-item approved">

<div class="status-icon">
<i class="fas fa-circle-check"></i>
</div>

<div class="status-info">

<div class="status-title">
Radios Aprobadas
</div>

<div class="status-number" id="approvedCount">
0
</div>

</div>

</div>

</div>

</div>

<!-- 🔥 PENDIENTES -->
<div class="section-title">
<i class="fas fa-clock"></i>
<span>Radios Pendientes</span>
</div>

<div
class="grid"
id="pendingGrid">

</div>

<!-- 🔥 APROBADAS -->
<div class="section-title">
<i class="fas fa-circle-check"></i>
<span>Radios Aprobadas</span>
</div>

<div
class="grid"
id="approvedGrid">

</div>

<!-- 🔥 FOOTER -->
<div class="footer">
RADIOS MULTIPLES © 2026
</div>

</div>

<script>

/* 🔥 API */
const API_URL =
"https://script.google.com/macros/s/AKfycbwSUCvzkXZbvHEt2HyIDWQIkeyT4p-N6CxQBg6GRZvyqWtvtl27yOzReNzHjVJ256U8Qg/exec";

/* 🔥 ELEMENTOS */
const pendingGrid =
document.getElementById("pendingGrid");

const approvedGrid =
document.getElementById("approvedGrid");

const pendingCount =
document.getElementById("pendingCount");

const approvedCount =
document.getElementById("approvedCount");

/* 🔥 CARGAR */
async function cargarRadios(){

pendingGrid.innerHTML =
`
<div class="empty">
📡 Cargando radios...
</div>
`;

approvedGrid.innerHTML =
`
<div class="empty">
📻 Cargando radios aprobadas...
</div>
`;

try{

const response =
await fetch(API_URL + "?t=" + Date.now());

const text =
await response.text();

const data =
JSON.parse(text);

/* 🔥 LIMPIAR */
pendingGrid.innerHTML = "";
approvedGrid.innerHTML = "";

/* 🔥 VALIDAR */
const pendientes =
data.pendientes || [];

const aprobadas =
data.aprobadas || [];

/* 🔥 CONTADORES */
pendingCount.innerText =
pendientes.length;

approvedCount.innerText =
aprobadas.length;

/* 🔥 SIN PENDIENTES */
if(pendientes.length===0){

pendingGrid.innerHTML =
`
<div class="empty">
✅ No hay radios pendientes
</div>
`;

}else{

pendientes.forEach(radio=>{

pendingGrid.innerHTML += crearCard(radio,true);

});

}

/* 🔥 SIN APROBADAS */
if(aprobadas.length===0){

approvedGrid.innerHTML =
`
<div class="empty">
📻 No hay radios aprobadas
</div>
`;

}else{

aprobadas.forEach(radio=>{

approvedGrid.innerHTML += crearCard(radio,false);

});

}

}catch(error){

console.log(error);

pendingGrid.innerHTML =
`
<div class="empty">
❌ Error cargando radios
</div>
`;

}

}

/* 🔥 CREAR CARD */
function crearCard(radio,pendiente){

return `

<div class="card">

<img
src="${radio.logo}"
class="logo"
onerror="this.src='https://via.placeholder.com/150'">

<div class="name">
${radio.nombre}
</div>

<div class="tags">

<div class="tag">
🌎 ${radio.pais || "Sin país"}
</div>

<div class="tag">
📍 ${radio.ciudad || "Sin ciudad"}
</div>

</div>

<div class="info">
${radio.descripcion || "Sin descripción"}
</div>

<div class="links">

${radio.web ? `
<a href="${radio.web}" target="_blank">
<i class="fas fa-globe"></i>
</a>
` : ""}

${radio.facebook ? `
<a href="${radio.facebook}" target="_blank">
<i class="fab fa-facebook-f"></i>
</a>
` : ""}

${radio.instagram ? `
<a href="${radio.instagram}" target="_blank">
<i class="fab fa-instagram"></i>
</a>
` : ""}

${radio.whatsapp ? `
<a href="https://wa.me/${radio.whatsapp}" target="_blank">
<i class="fab fa-whatsapp"></i>
</a>
` : ""}

</div>

<audio
controls
preload="none"
src="${radio.stream}">
</audio>

${pendiente ? `

<div class="buttons">

<button
class="approve"
onclick="aprobar(${radio.fila})">

✅ Aprobar

</button>

<button
class="delete"
onclick="eliminar(${radio.fila})">

🗑 Eliminar

</button>

</div>

` : ""}

</div>

`;

}

/* 🔥 APROBAR */
async function aprobar(fila){

await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"aprobar",
fila:fila
})
});

cargarRadios();

}

/* 🔥 ELIMINAR */
async function eliminar(fila){

await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"eliminar",
fila:fila
})
});

cargarRadios();

}

/* 🔥 INICIAR */
cargarRadios();

</script>

</body>
</html>
