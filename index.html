<!DOCTYPE html>
<html lang="es">
<head> 

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<meta
name="theme-color"
content="#020617">

<title>Panel Administrativo</title>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html{
width:100%;
height:100%;
overflow:hidden;
overscroll-behavior:none;
}

body{
width:100%;
height:100%;
overflow:hidden;
font-family:Poppins,sans-serif;
background:
linear-gradient(rgba(2,6,23,.94),rgba(2,6,23,.98)),
url("https://images.unsplash.com/photo-1590602847861-f357a9332bbc?q=80&w=1200&auto=format&fit=crop");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
color:#fff;
position:fixed;
inset:0;
}

/* 🔥 APP */
.admin-app{
width:100%;
height:100dvh;
overflow-y:auto;
overflow-x:hidden;
padding:14px;
padding-bottom:25px;
-webkit-overflow-scrolling:touch;
}

/* 🔥 SCROLL */
.admin-app::-webkit-scrollbar{
width:3px;
}

.admin-app::-webkit-scrollbar-thumb{
background:#334155;
border-radius:20px;
}

/* 🔥 TOPBAR */
.topbar{
display:flex;
flex-direction:column;
gap:12px;
margin-bottom:15px;
}

/* 🔥 LOGO */
.logo-box{
display:flex;
align-items:center;
gap:12px;
width:100%;
padding:14px;
background:rgba(2,6,23,.70);
border:1px solid rgba(255,255,255,.05);
border-radius:22px;
backdrop-filter:blur(12px);
}

.panel-logo{
width:65px;
height:65px;
border-radius:18px;
object-fit:cover;
background:#fff;
padding:3px;
flex-shrink:0;
}

/* 🔥 TITULO */
h1{
font-size:24px;
font-weight:800;
line-height:1;
}

.subtitle{
opacity:.7;
margin-top:4px;
font-size:12px;
}

/* 🔥 CONTADORES */
.status-box{
display:flex;
flex-direction:column;
gap:10px;
width:100%;
}

.status-item{
display:flex;
align-items:center;
gap:12px;
padding:14px;
border-radius:22px;
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.05);
}

.status-item.pending{
background:rgba(15,23,42,.88);
}

.status-item.approved{
background:rgba(5,46,22,.88);
border-color:#166534;
}

.status-icon{
width:52px;
height:52px;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
flex-shrink:0;
}

.status-item.pending .status-icon{
background:rgba(234,179,8,.12);
border:1px solid rgba(234,179,8,.25);
}

.status-item.approved .status-icon{
background:rgba(34,197,94,.15);
border:1px solid rgba(34,197,94,.25);
}

.status-title{
font-size:13px;
opacity:.7;
font-weight:600;
}

.status-number{
font-size:24px;
font-weight:800;
margin-top:3px;
}

/* 🔥 TITULOS */
.section-title{
font-size:20px;
font-weight:800;
margin-top:18px;
margin-bottom:12px;
display:flex;
align-items:center;
gap:8px;
}

/* 🔥 GRID */
.grid{
display:grid;
grid-template-columns:1fr;
gap:14px;
}

/* 🔥 SCROLL APROBADAS */
#approvedGrid{
max-height:650px;
overflow-y:auto;
padding-right:4px;
}

#approvedGrid::-webkit-scrollbar{
width:4px;
}

#approvedGrid::-webkit-scrollbar-thumb{
background:#334155;
border-radius:20px;
}

/* 🔥 CARD */
.card{
background:rgba(15,23,42,.82);
border-radius:24px;
padding:18px;
border:1px solid rgba(255,255,255,.04);
backdrop-filter:blur(12px);
overflow:hidden;
}

/* 🔥 LOGO RADIO */
.logo{
width:95px;
height:95px;
border-radius:22px;
object-fit:cover;
display:block;
margin:auto;
background:#fff;
padding:4px;
}

/* 🔥 NOMBRE */
.name{
font-size:18px;
font-weight:800;
margin-top:14px;
text-align:center;
line-height:1.2;
}

/* 🔥 INFO */
.info{
font-size:12px;
opacity:.9;
margin-top:6px;
text-align:center;
line-height:1.5;
word-break:break-word;
color:#cbd5e1;
}

/* 🔥 AUDIO */
audio{
width:100%;
margin-top:12px;
height:38px;
border-radius:12px;
}

/* 🔥 BOTONES */
.buttons{
display:flex;
flex-direction:column;
gap:10px;
margin-top:14px;
}

button{
width:100%;
border:none;
padding:12px;
border-radius:15px;
font-weight:700;
cursor:pointer;
font-size:13px;
font-family:Poppins;
transition:.2s;
}

button:active{
transform:scale(.96);
}

.approve{
background:linear-gradient(180deg,#22c55e,#16a34a);
color:#fff;
}

.delete{
background:linear-gradient(180deg,#ef4444,#dc2626);
color:#fff;
}

/* 🔥 VACIO */
.empty{
width:100%;
padding:40px 16px;
text-align:center;
font-size:15px;
font-weight:600;
opacity:.75;
background:rgba(15,23,42,.60);
border-radius:22px;
}

/* 🔥 FOOTER */
.footer{
margin-top:18px;
text-align:center;
opacity:.55;
font-size:11px;
padding-bottom:8px;
}

/* 🔥 TABLET */
@media(min-width:700px){

.admin-app{
padding:20px;
}

.status-box{
flex-direction:row;
}

.status-item{
flex:1;
}

.grid{
grid-template-columns:repeat(2,1fr);
}

.buttons{
flex-direction:row;
}

button{
flex:1;
}

}

/* 🔥 PC */
@media(min-width:1100px){

.grid{
grid-template-columns:repeat(3,1fr);
}

h1{
font-size:30px;
}

.section-title{
font-size:24px;
}

}

/* 🔥 TELEFONOS PEQUEÑOS */
@media(max-height:740px){

.admin-app{
padding:10px;
}

.panel-logo{
width:58px;
height:58px;
}

h1{
font-size:21px;
}

.status-item{
padding:11px;
}

.section-title{
font-size:18px;
}

.logo{
width:85px;
height:85px;
}

.card{
padding:15px;
}

}

</style>

</head>

<body>

<div class="admin-app">

<!-- 🔥 HEADER -->
<div class="topbar">

<div class="logo-box">

<img
src="https://i.ibb.co/qY7V1cVg/4008656-splash.png"
class="panel-logo">

<div>

<h1>
RADIOS MULTIPLES
</h1>

<p class="subtitle">
Panel Administrativo
</p>

</div>

</div>

<!-- 🔥 CONTADORES -->
<div class="status-box">

<div class="status-item pending">

<div class="status-icon">
🕒
</div>

<div>

<div class="status-title">
Radios Pendientes
</div>

<div class="status-number" id="pendingCount">
0
</div>

</div>

</div>

<div class="status-item approved">

<div class="status-icon">
✅
</div>

<div>

<div class="status-title">
Radios Aprobadas
</div>

<div class="status-number" id="approvedCount">
0
</div>

</div>

</div>

</div>

</div>

<!-- 🔥 PENDIENTES -->
<div class="section-title">
🕒 Radios Pendientes
</div>

<div
class="grid"
id="pendingGrid">

</div>

<!-- 🔥 APROBADAS -->
<div class="section-title">
✅ Radios Aprobadas
</div>

<div
class="grid"
id="approvedGrid">

</div>

<!-- 🔥 FOOTER -->
<div class="footer">
RADIOS MULTIPLES © 2026
</div>

</div>

<script>

/* 🔥 API */
const API_URL =
"https://script.google.com/macros/s/AKfycbx6x3SlWnUmVPRnSbxB_eWouTJTpLygrrcP65Dvo_8thYHWSTLRYb5D2r1hwEqTsBqx_w/exec";

/* 🔥 ELEMENTOS */
const pendingGrid =
document.getElementById("pendingGrid");

const approvedGrid =
document.getElementById("approvedGrid");

const pendingCount =
document.getElementById("pendingCount");

const approvedCount =
document.getElementById("approvedCount");

/* 🔥 CREAR CARD */
function crearCard(radio,pendiente=true){

/* 🔥 PENDIENTES CON PLAYER */
if(pendiente){

return `

<div class="card">

<div style="
display:flex;
align-items:center;
gap:14px;
">

<img
src="${radio.logo || ''}"
class="logo"
style="
width:72px;
height:72px;
margin:0;
flex-shrink:0;
"
onerror="this.src='https://via.placeholder.com/150'">

<div style="flex:1;">

<div class="name"
style="
margin-top:0;
text-align:left;
font-size:16px;
">
${radio.nombre || 'Sin nombre'}
</div>

<div class="info"
style="
text-align:left;
margin-top:4px;
">
🌎 ${radio.pais || ''}
</div>

<div class="info"
style="
text-align:left;
margin-top:2px;
">
📍 ${radio.ciudad || ''}
</div>

<div class="info"
style="
text-align:left;
margin-top:4px;
">
${radio.descripcion || ''}
</div>

</div>

</div>

<!-- 🔥 PLAYER -->
<audio
controls
preload="none"
style="
margin-top:14px;
width:100%;
"
src="${radio.stream || ''}">
</audio>

<div class="buttons"
style="
margin-top:14px;
">

<button
class="approve"
onclick="aprobar(${radio.fila})">

✅ Aprobar

</button>

<button
class="delete"
onclick="eliminar(${radio.fila})">

🗑 Eliminar

</button>

</div>

</div>

`;

}

/* 🔥 APROBADAS LISTA */
return `

<div class="card"
style="
padding:14px;
">

<div style="
display:flex;
align-items:center;
gap:14px;
">

<div style="
width:34px;
height:34px;
border-radius:12px;
background:#1e293b;
display:flex;
align-items:center;
justify-content:center;
font-weight:800;
font-size:14px;
flex-shrink:0;
">
${radio.numero}
</div>

<img
src="${radio.logo || ''}"
class="logo"
style="
width:62px;
height:62px;
margin:0;
flex-shrink:0;
"
onerror="this.src='https://via.placeholder.com/150'">

<div style="
flex:1;
min-width:0;
">

<div class="name"
style="
margin-top:0;
text-align:left;
font-size:16px;
line-height:1.2;
">
${radio.nombre || 'Sin nombre'}
</div>

<div class="info"
style="
text-align:left;
margin-top:4px;
">
🌎 ${radio.pais || ''}
</div>

<div class="info"
style="
text-align:left;
margin-top:2px;
">
📍 ${radio.ciudad || ''}
</div>

</div>

</div>

</div>

`;

}

/* 🔥 CARGAR RADIOS */
async function cargarRadios(){

pendingGrid.innerHTML =
`
<div class="empty">
📡 Cargando radios...
</div>
`;

approvedGrid.innerHTML =
`
<div class="empty">
📡 Cargando radios...
</div>
`;

try{

const response =
await fetch(
API_URL + "?nocache=" + new Date().getTime(),
{
method:"GET",
mode:"cors",
headers:{
"Accept":"application/json"
}
}
);

if(!response.ok){

throw new Error(
"HTTP ERROR: " + response.status
);

}

const text =
await response.text();

console.log("RESPUESTA:",text);

const data =
JSON.parse(text);

/* 🔥 LIMPIAR */
pendingGrid.innerHTML = "";
approvedGrid.innerHTML = "";

/* 🔥 ARRAYS */
const pendientes =
Array.isArray(data.pendientes)
? data.pendientes
: [];

const aprobadas =
Array.isArray(data.aprobadas)
? data.aprobadas
: [];

/* 🔥 CONTADORES */
pendingCount.textContent =
pendientes.length;

approvedCount.textContent =
aprobadas.length;

/* 🔥 PENDIENTES */
if(pendientes.length === 0){

pendingGrid.innerHTML =
`
<div class="empty">
✅ No hay radios pendientes
</div>
`;

}else{

pendientes.forEach(radio=>{

pendingGrid.innerHTML +=
crearCard(radio,true);

});

}

/* 🔥 APROBADAS */
if(aprobadas.length === 0){

approvedGrid.innerHTML =
`
<div class="empty">
📻 No hay radios aprobadas
</div>
`;

}else{

aprobadas.forEach((radio,index)=>{

radio.numero = index + 1;

approvedGrid.innerHTML +=
crearCard(radio,false);

});

}

}catch(error){

console.log("ERROR:",error);

pendingGrid.innerHTML =
`
<div class="empty">
❌ Error cargando radios
</div>
`;

approvedGrid.innerHTML =
`
<div class="empty">
⚠️ ${error.message}
</div>
`;

}

}

/* 🔥 APROBAR */
async function aprobar(fila){

try{

await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"aprobar",
fila:fila
})
});

cargarRadios();

}catch(error){

console.log("ERROR APROBAR:",error);

}

}

/* 🔥 ELIMINAR */
async function eliminar(fila){

try{

await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"eliminar",
fila:fila
})
});

cargarRadios();

}catch(error){

console.log("ERROR ELIMINAR:",error);

}

}

/* 🔥 INICIAR */
window.onload = cargarRadios;

</script>

</body>
</html>
